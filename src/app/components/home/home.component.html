<section>
      <form>
            <input type="text" name="home-research" placeholder="Filter by city" #filter>
            <button type="button" class="search-btn" (click)="filterResults(filter.value); filter.value=''">Search</button>
      </form>
</section>
<section class="results">
      @for (housingLocation of filteredHousingLocationList; track housingLocation.id) {
            <app-housing-location [housingLocation]="housingLocation"></app-housing-location>
      }    
</section>
